name: ci
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # We test the pure-Python logic (features + detector). The eBPF tracer needs
      # root + a real kernel, so it's exercised manually, not in CI -- a normal
      # split for kernel-adjacent projects.
      - run: pip install -r requirements.txt pytest
      - run: pytest -q tests/
